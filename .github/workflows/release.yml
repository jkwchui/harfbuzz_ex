name: Build and Release NIFs

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  
jobs:
  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.16", "2.15"] # Support recent Erlang NIF versions
        job:
          - { target: x86_64-unknown-linux-gnu,     os: ubuntu-20.04 }
          - { target: aarch64-unknown-linux-gnu,    os: ubuntu-20.04, use-cross: true }
          - { target: x86_64-apple-darwin,          os: macos-13 }
          - { target: aarch64-apple-darwin,         os: macos-14 }
          - { target: x86_64-pc-windows-msvc,       os: windows-2019 }
          - { target: x86_64-pc-windows-gnu,        os: windows-2019 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Project Version
        shell: bash
        run: |
          # Get the version from the tag (e.g., v0.1.0 -> 0.1.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "PROJECT_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Build the NIF
        uses: philss/rustler-precompiled-action@v1.0.1
        with:
          project-name: harfbuzz_ex
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross }}
          project-dir: "native/harfbuzz_ex"

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.tar.gz
            *.sha256
        if: startsWith(github.ref, 'refs/tags/')
